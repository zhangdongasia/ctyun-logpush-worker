# ═══════════════════════════════════════════════════════════════════════════
#  BACKFILL Worker — 补传历史日志专用（和生产 worker 并存、独立部署）
# ═══════════════════════════════════════════════════════════════════════════
#
# 用途：把 [BACKFILL_START_TIME, BACKFILL_END_TIME] 时间范围内的 Logpush 原始日志
#       重新处理并推送给接收端，让客户监控看起来连贯完整。
#
# 使用步骤：
#   1. 修改下方 BACKFILL_START_TIME 和 BACKFILL_END_TIME 为需要补传的精确时间范围
#   2. 修改 account_id、bucket_name、queue 名（如果和生产环境不一致）
#   3. wrangler deploy --config wrangler_backfill.toml
#   4. 监控进度：
#        curl https://ctyun-logpush-backfill.<your-subdomain>.workers.dev/backfill/status
#      或看 Worker Logs 里的 [BACKFILL] 前缀日志
#   5. 补传完成后（status=done）：
#        wrangler delete --config wrangler_backfill.toml    # 删除 worker
#      或先改 BACKFILL_ENABLED = "false" 再 redeploy（保留 worker 但停止）
#
# 与生产 worker(ctyun-logpush)的关系：
#   - 独立 worker name，独立 cron，不影响生产
#   - 共享同一 R2 bucket 和 parse-queue（通过 binding）
#   - 不直接调接收端，只入队 parse-queue；下游 Parser/Sender 由生产 worker 处理
#   - 不需要 CTYUN_* secrets
#
# 关键原理：
#   Phase 1: 清理 processed/ 下 [A,B] 时间范围的 batch 文件和 .done 标记
#            (否则 Sender 会因 .done 存在而"跳过重复"，导致客户收不到补传)
#   Phase 2: 按日期 prefix 扫 logs/YYYYMMDD/，rate-limited 入队 parse-queue
#            (默认 10 文件/分钟，可调至 100)
# ═══════════════════════════════════════════════════════════════════════════

name                 = "ctyun-logpush-backfill"
account_id           = "0297df3199a94c8082d099ac2212c40a"
main                 = "src/index_backfill.js"
compatibility_date   = "2026-03-27"
compatibility_flags  = ["nodejs_compat"]
workers_dev          = true      # 开启 workers.dev 域名，便于访问 /backfill/status
preview_urls         = false

# ─── R2 存储桶（与生产 worker 保持一致，共享同一 bucket）──────────────────────
[[r2_buckets]]
binding     = "RAW_BUCKET"
bucket_name = "cdn-logs-raw"             # 与生产 wrangler.toml 的 bucket_name 一致

# ─── Queue 生产者（只做 producer，不消费）──────────────────────────────────────
# 入队到和生产 worker 同一个 parse-queue，下游 Parser 复用生产代码
[[queues.producers]]
binding = "PARSE_QUEUE"
queue   = "parse-queue"                  # 与生产 wrangler.toml 的 parse-queue 一致

# ─── 环境变量 ─────────────────────────────────────────────────────────────────
[vars]
# ==== 必填：补传时间范围（客户填两个精确时间点）====
# 格式：ISO 8601
#   UTC:              "2026-04-22T14:00:00Z"
#   北京时间:          "2026-04-22T22:00:00+08:00"
# 注意：
#   - START 必须早于 END
#   - 范围最大 48 小时（防误操作；如需更大可编辑 index_backfill.js 里的 MAX_RANGE_HOURS）
#   - 补传匹配策略为"宽松交集"：任何和 [A,B] 有时间重叠的 Logpush 文件都会被补传
#     (Logpush 文件通常为 5min 粒度，所以两端可能有 0-5 分钟重复，客户监控一般可接受)
BACKFILL_START_TIME = ""
BACKFILL_END_TIME   = ""

# ==== 限流参数 ====
# 每次 Cron（每分钟）最多入队的 raw 文件数
# 默认 10：约占生产容量 13%，对实时业务影响最小
# 加大可缩短补传总时长，但 send-queue backlog 会更大
# 建议：先默认跑一阵看进度，再根据需要调整（改后 redeploy）
#   - 10 / min  → 约 17 msg/s 额外负载（最保守，默认）
#   - 30 / min  → 约 50 msg/s（占生产容量 40%，明显积压但可控）
#   - 100 / min → 约 170 msg/s（接近生产容量上限，可能打爆）
BACKFILL_RATE = "10"

# ==== 可选开关 ====
# 设为 "false" 可临时暂停补传（redeploy 生效，state 保留）
BACKFILL_ENABLED = "true"

# ==== 其他参数 ====
R2_BUCKET_NAME    = "cdn-logs-raw"      # 仅为 log 显示，需与 [[r2_buckets]] bucket_name 一致
LOG_PREFIX        = "logs/"             # Logpush 写入 R2 的根路径前缀（扫描 logs/YYYYMMDD/）
LOG_LEVEL         = "info"

# ─── Cron 触发器 ─────────────────────────────────────────────────────────────
# 每分钟一次（CF Cron 最小粒度）
# 已完成时 scheduled handler 秒级返回，资源消耗可忽略
[triggers]
crons = ["* * * * *"]

[observability]
[observability.logs]
enabled         = true
invocation_logs = true

# ─── CPU 时间上限 ─────────────────────────────────────────────────────────────
# 主要用于 Phase 1 cleanup 阶段批量 delete R2 对象时的 CPU 开销
[limits]
cpu_ms = 60000
