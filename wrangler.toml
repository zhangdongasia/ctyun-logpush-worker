name = "ctyun-logpush"
main = "src/index.js"
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]
account_id = "0297df3199a94c8082d099ac2212c40a"

# ─── R2 存储桶 ────────────────────────────────────────────────────────────────
# 如需修改 R2 bucket 名字：
#   1. 修改下面的 bucket_name 为新名字
#   （binding = "RAW_BUCKET" 不要改，index.js 通过此 binding 访问）
[[r2_buckets]]
binding     = "RAW_BUCKET"
bucket_name = "cdn-logs-raw"

# ─── Queue 生产者 ─────────────────────────────────────────────────────────────
# 如需修改 Queue 名字：
#   1. 修改下面两个 queue = "..." 为新名字
#   2. 同步修改下方 consumers 里对应的 queue = "..." 为相同名字
#   3. 同步修改 [vars] 里的 PARSE_QUEUE_NAME / SEND_QUEUE_NAME 为相同名字
#   （binding = "PARSE_QUEUE" / "SEND_QUEUE" 不要改，index.js 通过此 binding 发消息）
[[queues.producers]]
binding = "PARSE_QUEUE"
queue   = "parse-queue"

[[queues.producers]]
binding = "SEND_QUEUE"
queue   = "send-queue"

# ─── Queue 消费者 ─────────────────────────────────────────────────────────────
[[queues.consumers]]
queue              = "parse-queue"   # 必须与上方 producers parse-queue 名字一致
max_batch_size     = 3
max_batch_timeout  = 10
max_retries        = 2
dead_letter_queue  = "parse-dlq"

[[queues.consumers]]
queue              = "send-queue"    # 必须与上方 producers send-queue 名字一致
max_batch_size     = 50
max_batch_timeout  = 5
max_retries        = 5
dead_letter_queue  = "send-dlq"

# ─── 环境变量 ─────────────────────────────────────────────────────────────────
# PARSE_QUEUE_NAME / SEND_QUEUE_NAME 必须与上方 queue = "..." 的名字完全一致
# index.js 通过这两个变量识别消息来自哪个 queue，无需修改 index.js
#
# PUSH_START_TIME：精准时间点推送控制
#   - 空字符串（默认）：不过滤，正常处理所有日志
#   - 设置后：仅推送该时间点之后产生的日志，之前的日志静默跳过
#   - 格式：ISO 8601，例如 "2026-04-15T10:00:00Z"（UTC）
#          或 "2026-04-15T18:00:00+08:00"（北京时间）
#   - 一次性逻辑：时间点过后所有新文件均满足条件，过滤自动失效，无需修改代码
[vars]
PARSE_QUEUE_NAME = "parse-queue"
SEND_QUEUE_NAME  = "send-queue"
BATCH_SIZE       = "1000"
LOG_LEVEL        = "info"
PUSH_START_TIME  = "2026-04-17T11:30:00+08:00"


workers_dev  = false
preview_urls = false

[observability]
[observability.logs]
enabled         = true
invocation_logs = true
