# ─── 基础配置（部署前请根据实际情况修改）────────────────────────────────────
# name: Worker 名字，自定义，会显示在 CF Dashboard
# account_id: 你的 Cloudflare Account ID，从 Dashboard 右上角或 `wrangler whoami` 获取
name = "ctyun-logpush"
account_id = "0297df3199a94c8082d099ac2212c40a"
main = "src/index_optimized.js"  # 启用 chunked 发送版本；若需回退，改回 src/index.js
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]
workers_dev  = false

# ─── R2 存储桶（部署前必须确认/修改）─────────────────────────────────────────
# bucket_name: 你在 CF R2 中创建的实际 bucket 名字
# 同步修改下方 [vars] 里的 R2_BUCKET_NAME 保持一致
# （binding = "RAW_BUCKET" 不要改，index.js 通过此 binding 访问 R2）
[[r2_buckets]]
binding     = "RAW_BUCKET"
bucket_name = "cdn-logs-raw"

# ─── Queue 生产者 ─────────────────────────────────────────────────────────────
# 如需修改 Queue 名字：
#   1. 修改下面两个 queue = "..." 为新名字
#   2. 同步修改下方 consumers 里对应的 queue = "..." 为相同名字
#   3. 同步修改 [vars] 里的 PARSE_QUEUE_NAME / SEND_QUEUE_NAME 为相同名字
#   （binding = "PARSE_QUEUE" / "SEND_QUEUE" 不要改，index.js 通过此 binding 发消息）
[[queues.producers]]
binding = "PARSE_QUEUE"
queue   = "parse-queue"

[[queues.producers]]
binding = "SEND_QUEUE"
queue   = "send-queue"

# ─── Queue 消费者 ─────────────────────────────────────────────────────────────
[[queues.consumers]]
queue              = "parse-queue"   # 必须与上方 producers parse-queue 名字一致
max_batch_size     = 3
max_batch_timeout  = 10
max_retries        = 2
dead_letter_queue  = "parse-dlq"

[[queues.consumers]]
queue              = "send-queue"    # 必须与上方 producers send-queue 名字一致
max_batch_size     = 50              # 单次最多取 50 条；同一 batch 内 for-await 串行，避免单 invocation 内并发 POST
max_batch_timeout  = 5
max_retries        = 5
dead_letter_queue  = "send-dlq"
# max_concurrency 故意不设置：由 Queue autoscaler 自动扩缩（当前上限 250），保证吞吐。
# Queue 重复投递的并发重复 POST 风险由 sendBatchUnlocked 中的 .done 标记缩窄。

# ─── 环境变量 ─────────────────────────────────────────────────────────────────
# PARSE_QUEUE_NAME / SEND_QUEUE_NAME 必须与上方 queue = "..." 的名字完全一致
# index.js 通过这两个变量识别消息来自哪个 queue，无需修改 index.js
#
# PUSH_START_TIME：统一时间点推送控制（一个变量，两种模式）
#   - 空字符串（默认）：不过滤，正常处理所有日志
#   - 未来时间：到达该时间点后自动开始推送，之前的日志静默跳过
#   - 过去时间：部署后 1 分钟内自动扫描 R2 补传历史文件，同时继续推送新日志
#   - 格式：ISO 8601，例如 "2026-04-15T10:00:00Z"（UTC）
#          或 "2026-04-15T18:00:00+08:00"（北京时间）
#   - 一次性逻辑：时间点过后所有新文件自然通过过滤，无需修改代码
#   - 补救幂等：同一个时间值只执行一次恢复（通过 R2 标记文件防重复）
# FIELD11_SERVER_IP：EdgeServerIP 为空时的兜底值；为空时输出 "-"
[vars]
PARSE_QUEUE_NAME = "parse-queue"
SEND_QUEUE_NAME  = "send-queue"
R2_BUCKET_NAME   = "cdn-logs-raw"   # 必须与上方 [[r2_buckets]] bucket_name 完全一致
BATCH_SIZE       = "2000"            # 每批 2000 行，降低消息数以提升整体吞吐
RAW_LOG_PREFIX   = "logs/"          # 仅处理匹配此前缀的 R2 原始日志对象
RAW_LOG_SUFFIX   = ".log.gz"        # 仅处理匹配此后缀的 R2 原始日志对象
LOG_LEVEL        = "info"
PUSH_START_TIME  = ""
FIELD11_SERVER_IP = ""
SEND_PARALLELISM = "2"               # 单次 invocation 内的小并行度（1=串行；建议 2；上限软限制 8）

# ─── Cron 触发器 ─────────────────────────────────────────────────────────────
# 每分钟触发一次 scheduled handler，用于检查是否需要触发历史日志补传
# 补传仅在 PUSH_START_TIME 为过去时间且未执行过时触发，其他情况秒级返回
[triggers]
crons = ["* * * * *"]

[observability]
[observability.logs]
enabled         = true
invocation_logs = true

# ─── CPU 时间上限 ─────────────────────────────────────────────────────────────
# 默认 30 秒，Enterprise 最高可提至 5 分钟（300000）
# 设 60 秒给单个大文件处理（~100K 行 / ~50MB gzip）提供 2x 安全余量
# 适配大流量客户场景：6000+ req/s 产生的 Logpush 单文件可能接近 100K 行
[limits]
cpu_ms = 60000
